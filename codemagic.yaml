workflows:
  android-release:
    name: Android Release APK
    max_build_duration: 60
    environment:
      flutter: stable
      vars:
        API_BASE_URL: https://noor-companion.onrender.com/api/v1
        SUPABASE_URL: https://dtfilugfvtlngmxynmrd.supabase.co
        SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR0ZmlsdWdmdnRsbmdteHlubXJkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwODAwNjcsImV4cCI6MjA4OTY1NjA2N30.w7NyXKqYr7YAuif03FxP0GoVyO7f9ApM7ySsM2jgaEs
        AGORA_APP_ID: 6ce3461bcc5c480c81f30209ebc759f8
        WEBSITE_URL: https://noorcompanion.netlify.app
    scripts:
      - name: Get Flutter packages
        script: |
          cd mobile
          flutter pub get
      - name: Build APK
        script: |
          cd mobile
          flutter build apk --release \
            --dart-define=API_BASE_URL=$API_BASE_URL \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=AGORA_APP_ID=$AGORA_APP_ID \
            --dart-define=WEBSITE_URL=$WEBSITE_URL
    artifacts:
      - mobile/build/app/outputs/flutter-apk/app-release.apk
